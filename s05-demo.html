<!DOCTYPE html>

      li {
        color: blue;
      }
      ul {
        color: red;
        /* list-style-type:square; */
      }
      ul ul {
        list-style-image: url("images/smiley.gif");
        /*TODO: How to make the smiley.gif as bullet image  for the list items only in sublists   */
      }

    <h1>Lists</h1>

      <li>

          <li>Football</li>
        </ul>
      </li>
      <li>

        </ul>

    </ul>
