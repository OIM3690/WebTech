<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table demo</title>
    <style>
      table {
        /* border: 1px solid black; */
        border-collapse: collapse;
        margin-left: auto;
        margin-right: auto;
        background-color: yellow;
      }
      th,
      td {
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Course</th>
        <th>Grade</th>
      </tr>
      <tr>
        <td>Web Tech</td>
        <td>A</td>
      </tr>
      <tr>
        <td>Accounting</td>
        <td>B+</td>
      </tr>
      <caption>
        My GPA
      </caption>
    </table>


    <table>
        <caption>Irregular Table Example</caption>
        <tr>
          <td>1</td>
          <td colspan="2">2</td>
        </tr>
        <tr>
          <td rowspan="2">3</td>
          <td>4</td>
          <td>5</td>
        </tr>
        <tr>
          <td>6</td>
          <td>7</td>
        </tr>
      </table>
  </body>
</html>
