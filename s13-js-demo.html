<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introduction to JavaScript - Demo</title>
  </head>
  <body>
    <h1>Click Me ... I am Changing</h1>
    <img id="img-mailbox" src="images/mailbox.png" alt="mailbox" width="30" />
    <div>
      <button onclick="c()">I dare you to click on me!</button>
    </div>
    <!-- <script src="scripts/s13-demo.js"></script> -->
    <script>
      const myImg = document.querySelector("#img-mailbox");

      function changeBackgroundColor(color) {
        // const bgColors = ["green", "yellow", "blue", "pink", "red", "orange"];
        // const n = bgColors.length;
        // const randIndex = Math.floor(Math.random() * n);
        const body = document.querySelector("body");
        // body.style.backgroundColor = bgColors[randIndex];
        body.style.backgroundColor = color;

        // body.style.color = "red";
        myImg.src = "images/reset.png";
      }

      document.querySelector("h1").onclick = function () {
        changeBackgroundColor("yellow");
      };

      function enlargeImage() {
        // const myImg = document.getElementById("img-mailbox");

        let w = myImg.width;
        w = w + 30;
        myImg.width = w;
      }
    //   document.querySelector("img").addEventListener("mouseover", function () {
    //     enlargeImage();
    //   });

      document.querySelector("img").addEventListener("mouseover", enlargeImage);

      function c() {
        window.alert("Haha!");
        window.location.href = "https://youtu.be/dQw4w9WgXcQ";
      }
    </script>
    <!-- 
    1. What does Math.floor() do?
    2. What is const? 
    3. function(){}  -> ()=>{}  
    4. How does `w` change? Why assigning it back?
    5. const myImg = document.querySelector("#img-mailbox"); 
    6. window.alert() vs. window.location.herf
    7. Pros and cons of internal/external JS
    8. How to connect <button onclick="c()"> with function defination?
    9. Is there better way to randomly pick up one item from an array?
    10. addEventListener vs onlick=
    -->
  </body>
</html>
