<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables and Functions</title>
  </head>
  <body>
    <script>
      let x = 10,
        y = 3;
      console.log(`x + y = ${x + y}`);
      x -= 5; // x = x - 5;
      console.log(x);

      const text = "Hi";
      console.log(text + x);

      console.log("10" + 5); //"105", which means 5 -> "5"
      console.log(10 + 5); // 15

      console.log("10" - 5); // 5, which means "10" -> 10
      console.log(10 - "5");

      console.log("10px" + 5);
      console.log("10px" - 5);
    </script>
  </body>
</html>
