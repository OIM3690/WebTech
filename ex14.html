<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 14</title>
  </head>
  <body>
    <h1>Manipulating Images using JavaScript</h1>
    <div>
      <img
        src="images/tiger1.jpg"
        alt="Tiger 1"
        title="Tiger is walking"
        width="400"
        id="tiger1"
      /> 
    </div>

    <script>
      /* Pseudo-code:
              1. Select the first image element on the page.
              2. Get the current width of the selected image.
              3. Increase the width by 10%.
              4. Update the image’s width with the new value.
              5. Attach this function to execute when the mouse hovers over the image.
              */

      // Define a function that increases the image size when the mouse hovers over it
      function enlargeImage() {
        // Log to the console when the function is triggered
        console.log("...Function enlargeImage starts...");

        // Select the image element on the webpage
        const tigerImage = document.querySelector("img");
        // Retrieve the current width of the image
        let width = tigerImage.width;

        // Log the current width to the console
        console.log("Current width:", width);

        // Increase the width by 10%
        width = width * 1.1;

        // Log the updated width to the console
        console.log(`New width: ${width}`);

        // Assign the new width back to the image
        tigerImage.width = width;
      }
      function reduceImage() {
        console.log("...Function reduceImage starts...");

        const tigerImage = document.querySelector("img");
        let width = tigerImage.width;
        console.log("Current width:", width);
        width = width / 1.1;
        console.log(`New width: ${width}`);
        tigerImage.width = width;
      }

      // What element? what event?
      // Syntax: element.addEventListener( "event", funciton)

      // Add an event listener to the image
      // When the mouse hovers over the image, the enlargeImage function is executed

      document.querySelector("img").addEventListener("mouseover", enlargeImage);

      document.querySelector("img").addEventListener("mouseout", reduceImage);
    </script>
  </body>
</html>
