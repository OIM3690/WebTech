<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="jokeButton">Get a Joke</button>
    <p id="jokeDisplay">What was a more important invention than the first telephone? The second one.</p>

    <script>
      async function generateDadJoke() {
        const response = await fetch("https://icanhazdadjoke.com/", {
          headers: { Accept: "application/json" },
        });
        const data = await response.json();
        console.log(data);
        document.getElementById("jokeDisplay").textContent = data.joke;
      }
      document
        .getElementById("jokeButton")
        .addEventListener("click", generateDadJoke);
    </script>
  </body>
</html>
