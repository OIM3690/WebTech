<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
  </head>
  <body>
    <h2>Simple Calculator</h2>
    <div>
      <label>
        <input id="num1" placeholder="Number 1" type="number" />
        <br />
        <br />
        <input id="num2" placeholder="Number 2" type="number" />
        <br />
        <br />
        <input id="result" placeholder="Your Result" readonly type="number" />
      </label>
    </div>
    <div>
      <button id="add">+</button>
      <button id="sub">-</button>
      <button id="mul">x</button>
      <button id="div">/</button>
      <button id="clear">clear</button>
    </div>
    <script>
      function calculate() {
        console.log("starting here...");
        const a = document.querySelector("#num1").innerText;
        const b = document.getElementById("#num2").innerText;

        let result = add(a, b);

        const r = document.getElementById("result");
        r.innerText = result;
        console.log("...done!");
      }

      function add(arg1, arg2) {
        const result = arg1 + arg2;
        return result;
      }

      document.getElementById("add").onclick = function () {
        calculate;
      };
    </script>
  </body>
</html>
