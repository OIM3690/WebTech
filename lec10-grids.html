<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout - Float</title>
    <style>
      body {
        background-color: black;
      }
      .container {
        background-color: yellow;
        /* padding: 15px; */
        display: grid;
        /* grid-template-columns: 200px 100px 150px; */
        /* grid-template-columns: 1fr 2fr 1fr;
        grid-template-rows: 100px 300px 100px; */
        grid-template-columns: 35% 35% 30%;
        grid-template-rows: 100px 300px 100px 300px; /*height for each row*/
        grid-template-areas:
          "header header header"
          "img img side"
          "img-caption img-caption side"
          "main-1 main-2 side";
        
        width: 90%;
        margin: 10px auto;
      }
      .item{
          /* height: 150px; */
          border: 3px solid black;
          background-color: lightgray;
          margin: 10px;
      }
      .item-1 {
        /* width: 200px; */
        grid-area: header;
      }
      .item-2 {
        /* height: 180px; */
        grid-area: img;
      }
      .item-3 {
        grid-area: img-caption;
      }
      .item-4 {
        grid-area: main-1;
      }
      .item-5 {
        grid-area: main-2;
      }
      .item-6 {
        grid-area: side;
      }
      
    </style>
  </head>
  <body>
    <div class="container">
        <div class="item item-1">Item 1</div>
        <div class="item item-2"><img src="images/elephant.jpg" alt=""></div>
        <div class="item item-3">Item 3</div>
        <div class="item item-4">
          Item 4<br />Lorem ipsum, dolor sit amet consectetur adipisicing elit.
          Sunt a hic cumque consequatur amet pariatur, aliquam ullam quo
          dignissimos sequi cum nulla vitae provident maxime labore reiciendis
          voluptas eius accusantium.
        </div>
        <div class="item item-5">Item 5</div>
        <div class="item item-6">Item 6</div>
        <!-- <div class="item item-7">Item 7</div> -->
    </div>
  </body>
</html>
