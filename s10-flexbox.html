<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Demo</title>
    <style>
      .container {
        background-color: lightgray;
        border: 1px solid red;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .item {
        background-color: yellow;
        border: 1px solid black;
        float: left;
        width: 30px;
      }

      /* how to horizontally align the items? 
      how to make the items vertially aligned in the same level?
      how to evenly distribute the spaces?
      */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Item 1</div>
      <div class="item">
        Item 2 Item 2 Item 2Item 2Item 2Item 2Item 2Item 2Item 2
      </div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item item-6">Item 6</div>
    </div>
  </body>
</html>
